# HungryHoundDog — Docker Compose (Brain Server)
# Weekend 3: OpenSearch + Grafana + FastAPI Ingestion
# Run: docker compose up -d
# Logs: docker compose logs -f

services:
  # --- OpenSearch: Single-node log storage and search engine ---
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: hhd-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - cluster.name=hungryhounddog
      - node.name=brain
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - hhd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # --- Grafana: Dashboard and visualization ---
  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: hhd-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=hungryhound
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./server/docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - hhd-net
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  # --- FastAPI: Log ingestion service ---
  ingestion:
    build:
      context: ./server/ingestion
      dockerfile: Dockerfile
    container_name: hhd-ingestion
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - INDEX_PREFIX=hungryhounddog-events
    ports:
      - "8080:8080"
    networks:
      - hhd-net
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  opensearch-data:
  grafana-data:

networks:
  hhd-net:
    driver: bridge
