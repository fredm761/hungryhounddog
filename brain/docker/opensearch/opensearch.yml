# OpenSearch Single-Node Configuration for HungryHoundDog Lab Environment
# =========================================================================
# This configuration is optimized for a single-node setup on "The Brain" Ubuntu PC.
# SECURITY WARNING: Plugins security is disabled for lab testing. Do NOT use in production.

# Cluster Configuration
cluster.name: hungryhounddog-cluster
node.name: hungryhounddog-node-1

# Network Configuration
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# Node Configuration
node.roles: [master, data, ingest]

# Discovery Configuration
discovery.type: single-node
discovery.seed_hosts: []

# Performance Tuning
indices.memory.index_buffer_size: 30%
thread_pool.search.queue_size: 1000

# Security (Disabled for Lab - DO NOT USE IN PRODUCTION)
plugins.security.disabled: true
plugins.security.ssl.http.enabled: false
plugins.security.ssl.transport.enabled: false

# Bootstrap Configuration
bootstrap.memory_lock: false

# Java Heap Size (must be set via container environment variables)
# JVM options should be configured in jvm.options or docker-compose
