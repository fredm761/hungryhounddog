# =============================================================================
# HungryHoundDog Sensor Agent Configuration
# =============================================================================
# This file is the single source of truth for both the log shipper and the
# health check agent running on the Raspberry Pi sensor.
#
# Location on sensor: /home/alfredo/hungryhounddog/sensor/agent/config.yaml
# =============================================================================

# --- Log Shipper Settings ---------------------------------------------------
shipper:
  # Path to Suricata's EVE JSON log file
  eve_json_path: "/var/log/suricata/eve.json"

  # Brain's FastAPI ingestion endpoint (Weekend 3 will stand this up)
  brain_endpoint: "https://10.0.0.180:8443/ingest"

  # Maximum number of events to accumulate before sending a batch
  batch_size: 50

  # Maximum seconds to wait before flushing a partial batch
  flush_interval_seconds: 10

  # Local fallback file when Brain is unreachable
  fallback_path: "/tmp/hungryhounddog_buffer.jsonl"

  # Maximum fallback file size in bytes before rotation (50 MB)
  fallback_max_bytes: 52428800

  # How often (seconds) to check if eve.json was rotated (inode change)
  rotation_check_seconds: 30

  # State file to persist the last read position across restarts
  state_file: "/var/lib/hungryhounddog/shipper_state.json"

# --- Health Check Settings --------------------------------------------------
health:
  # Brain's health reporting endpoint (Weekend 3 will stand this up)
  brain_endpoint: "https://10.0.0.180:8443/health/sensor"

  # Local fallback file when Brain is unreachable
  fallback_path: "/tmp/hungryhounddog_health.jsonl"

  # Paths to monitor for disk usage
  disk_paths:
    - "/"
    - "/var/log/suricata"

  # Suricata process name to check
  suricata_process_name: "suricata"

  # Network interfaces to report on
  interfaces:
    monitoring: "eth0"
    management: "wlan0"

# --- Shared Settings --------------------------------------------------------
shared:
  # Sensor hostname (used in all payloads sent to Brain)
  sensor_id: "sensor"

  # Log level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"

  # Agent log file
  log_file: "/var/log/hungryhounddog/agent.log"

  # Connection timeout for HTTP requests to Brain (seconds)
  http_timeout: 10

  # TLS verification (set to false until we set up proper certs in Weekend 7)
  tls_verify: false
